<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>이미지 분할 저장기</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background:#1e1e2e;
  color:#cdd6f4;
  font-family:"맑은 고딕","Apple SD Gothic Neo",sans-serif;
  display:flex;
  flex-direction:column;
  height:100dvh;
  overflow:hidden;
  user-select:none;
}

/* ── 툴바 ── */
#toolbar {
  background:#313244;
  padding:10px 12px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  box-shadow:0 2px 8px #0005;
  z-index:10;
  flex-shrink:0;
}
.btn {
  padding:10px 14px;
  border:none;
  border-radius:8px;
  font-family:inherit;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
  transition:opacity .15s, transform .1s;
  touch-action:manipulation;
}
.btn:active { opacity:.7; transform:scale(.95); }
.btn-blue   { background:#4a90d9; color:#fff; }
.btn-orange { background:#e67e22; color:#fff; }
.btn-red    { background:#e74c3c; color:#fff; }
.btn-green  { background:#27ae60; color:#fff; }
.lbl { font-size:13px; color:#bac2de; white-space:nowrap; }
input[type=number] {
  width:46px; padding:8px 4px; border-radius:6px;
  border:1px solid #555; background:#1e1e2e;
  color:#cdd6f4; font-size:14px; text-align:center;
}

/* ── 캔버스 화면 ── */
#screen-canvas {
  flex:1; display:flex; flex-direction:column; overflow:hidden;
}
#canvasWrap {
  flex:1; display:flex; align-items:center; justify-content:center;
  overflow:hidden; position:relative; background:#181825; touch-action:none;
}
#mainCanvas { display:block; cursor:crosshair; touch-action:none; }
#overlay {
  position:absolute; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
  color:#585b70; pointer-events:none; text-align:center; padding:20px;
}
#overlay .icon { font-size:56px; }
#overlay .txt  { font-size:16px; line-height:1.6; }
#statusBar {
  background:#313244; padding:8px 14px; font-size:12px;
  color:#a6adc8; border-top:1px solid #45475a; min-height:32px; flex-shrink:0;
}

/* ── 갤러리 화면 ── */
#screen-gallery {
  flex:1; display:none; flex-direction:column; overflow:hidden;
}

#galleryHeader {
  background:#313244; padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; box-shadow:0 2px 8px #0005;
}
#galleryHeader h2 { font-size:16px; font-weight:bold; }
#saveCount { font-size:12px; color:#a6e3a1; }

/* ── 갤러리 스크롤 영역 ── */
#galleryScroll {
  flex:1;
  overflow-y:auto;
  background:#181825;
  -webkit-overflow-scrolling:touch;
  padding:0 0 12px 0;
}

/* ── 이미지 리스트 ── */
#galleryList {
  display:flex;
  flex-direction:column;
}

/* 각 이미지 아이템 */
.img-item {
  position:relative;
  width:100%;
  background:#000;
  border-bottom:3px solid #181825;
  cursor:pointer;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

.img-item img {
  width:100%;
  height:auto;
  display:block;
  transition:opacity .2s;
}

/* 번호 뱃지 */
.img-num {
  position:absolute;
  top:10px; left:10px;
  background:rgba(0,0,0,.7);
  color:#fff;
  font-size:15px;
  font-weight:bold;
  padding:4px 10px;
  border-radius:6px;
  pointer-events:none;
  z-index:2;
}

/* 다운로드 힌트 */
.img-hint {
  position:absolute;
  bottom:0; left:0; right:0;
  background:linear-gradient(transparent, rgba(0,0,0,.75));
  color:#fff;
  font-size:13px;
  font-weight:bold;
  text-align:center;
  padding:24px 0 10px;
  pointer-events:none;
  z-index:2;
  opacity:1;
  transition:opacity .3s;
}

/* 저장됨 오버레이 */
.img-saved {
  display:none;
  position:absolute;
  inset:0;
  background:rgba(39,174,96,.3);
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:3;
}
.img-saved span {
  background:rgba(39,174,96,.9);
  color:#fff;
  font-size:22px;
  font-weight:bold;
  padding:10px 24px;
  border-radius:50px;
}
.img-item.saved .img-saved  { display:flex; }
.img-item.saved .img-hint   { opacity:0; }
.img-item.saved img         { opacity:.75; }

/* ── 하단 버튼 ── */
#galleryBottom {
  background:#313244;
  padding:10px 12px;
  display:flex;
  gap:8px;
  flex-shrink:0;
  border-top:1px solid #45475a;
}
#galleryBottom .btn { flex:1; text-align:center; }
</style>
</head>
<body>

<!-- 툴바 -->
<div id="toolbar">
  <button class="btn btn-blue"   onclick="openImage()">📂 열기</button>
  <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="loadImage(event)">
  <span class="lbl">열:</span>
  <input type="number" id="cols" value="4" min="1" max="20">
  <span class="lbl">행:</span>
  <input type="number" id="rows" value="5" min="1" max="20">
  <button class="btn btn-orange" onclick="resetLines()">🔄</button>
  <button class="btn btn-red"    onclick="splitImage()">✂️ 분할!</button>
</div>

<!-- 캔버스 화면 -->
<div id="screen-canvas">
  <div id="canvasWrap">
    <div id="overlay">
      <div class="icon">🖼️</div>
      <div class="txt">이미지를 열거나<br>여기에 드래그하세요</div>
    </div>
    <canvas id="mainCanvas"></canvas>
  </div>
  <div id="statusBar">준비 완료 — 이미지를 열어주세요!</div>
</div>

<!-- 갤러리 화면 -->
<div id="screen-gallery">

  <div id="galleryHeader">
    <h2>🖼️ 분할 결과</h2>
    <span id="saveCount">탭하면 저장돼요!</span>
  </div>

  <div id="galleryScroll">
    <div id="galleryList"></div>
  </div>

  <div id="galleryBottom">
    <button class="btn btn-blue"  onclick="showCanvas()">← 편집</button>
    <button class="btn btn-green" onclick="downloadAll()">⬇️ 전체 저장</button>
  </div>

</div>

<script>
// ── 전역 ─────────────────────────────────────────
const canvas   = document.getElementById('mainCanvas');
const ctx      = canvas.getContext('2d');
const wrap     = document.getElementById('canvasWrap');
const statusEl = document.getElementById('statusBar');
const overlay  = document.getElementById('overlay');

let origImg=null, scale=1, offsetX=0, offsetY=0, dispW=0, dispH=0;
let hLines=[], vLines=[], dragging=null;
const SNAP=18;
let tiles=[];
let savedSet=new Set();

// ── 이미지 열기 ──────────────────────────────────
function openImage(){ document.getElementById('fileInput').click(); }
function loadImage(e){ readFile(e.target.files[0]); }
function readFile(file){
  if(!file||!file.type.startsWith('image/')) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      origImg=img;
      overlay.style.display='none';
      fitCanvas(); resetLines();
      setStatus(`원본: ${img.width}×${img.height}px | 선을 드래그해서 조정하세요!`);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
wrap.addEventListener('dragover',e=>e.preventDefault());
wrap.addEventListener('drop',e=>{ e.preventDefault(); readFile(e.dataTransfer.files[0]); });

// ── 캔버스 ───────────────────────────────────────
function fitCanvas(){
  const maxW=wrap.clientWidth-20, maxH=wrap.clientHeight-20;
  scale=Math.min(maxW/origImg.width, maxH/origImg.height,1);
  dispW=Math.floor(origImg.width*scale);
  dispH=Math.floor(origImg.height*scale);
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
  offsetX=Math.floor((canvas.width-dispW)/2);
  offsetY=Math.floor((canvas.height-dispH)/2);
}

function resetLines(){
  if(!origImg) return;
  const cols=parseInt(document.getElementById('cols').value)||4;
  const rows=parseInt(document.getElementById('rows').value)||5;
  vLines=Array.from({length:cols-1},(_,i)=>offsetX+Math.floor(dispW*(i+1)/cols));
  hLines=Array.from({length:rows-1},(_,i)=>offsetY+Math.floor(dispH*(i+1)/rows));
  redraw();
}

function redraw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(origImg) ctx.drawImage(origImg,offsetX,offsetY,dispW,dispH);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1;
  ctx.strokeRect(offsetX,offsetY,dispW,dispH);
  ctx.lineWidth=2; ctx.setLineDash([8,4]);
  ctx.strokeStyle='#00cfff';
  hLines.forEach(y=>{ ctx.beginPath(); ctx.moveTo(offsetX,y); ctx.lineTo(offsetX+dispW,y); ctx.stroke(); });
  ctx.strokeStyle='#ffdd00';
  vLines.forEach(x=>{ ctx.beginPath(); ctx.moveTo(x,offsetY); ctx.lineTo(x,offsetY+dispH); ctx.stroke(); });
  ctx.setLineDash([]);
  const aY=[offsetY,...hLines.slice().sort((a,b)=>a-b),offsetY+dispH];
  const aX=[offsetX,...vLines.slice().sort((a,b)=>a-b),offsetX+dispW];
  ctx.font='bold 13px "맑은 고딕"';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  let n=1;
  for(let r=0;r<aY.length-1;r++)
    for(let c=0;c<aX.length-1;c++){
      const mx=(aX[c]+aX[c+1])/2, my=(aY[r]+aY[r+1])/2;
      ctx.fillStyle='rgba(0,0,0,.6)';
      ctx.beginPath(); ctx.arc(mx,my,14,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.fillText(n++,mx,my);
    }
}

// ── 드래그 ───────────────────────────────────────
function findLine(x,y){
  for(let i=0;i<hLines.length;i++) if(Math.abs(y-hLines[i])<SNAP) return{type:'h',index:i};
  for(let i=0;i<vLines.length;i++) if(Math.abs(x-vLines[i])<SNAP) return{type:'v',index:i};
  return null;
}
function moveLine(x,y){
  if(!dragging) return;
  if(dragging.type==='h')
    hLines[dragging.index]=Math.max(offsetY+4,Math.min(y,offsetY+dispH-4));
  else
    vLines[dragging.index]=Math.max(offsetX+4,Math.min(x,offsetX+dispW-4));
  redraw();
}
function getXY(e){ const r=canvas.getBoundingClientRect(); return[e.clientX-r.left,e.clientY-r.top]; }

canvas.addEventListener('mousedown', e=>{ dragging=findLine(...getXY(e)); });
canvas.addEventListener('mousemove', e=>{
  const[x,y]=getXY(e);
  if(dragging){ moveLine(x,y); return; }
  const f=findLine(x,y);
  canvas.style.cursor=f?(f.type==='h'?'ns-resize':'ew-resize'):'crosshair';
});
canvas.addEventListener('mouseup',   ()=>dragging=null);
canvas.addEventListener('mouseleave',()=>dragging=null);
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); const t=e.touches[0],r=canvas.getBoundingClientRect(); dragging=findLine(t.clientX-r.left,t.clientY-r.top); },{passive:false});
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); const t=e.touches[0],r=canvas.getBoundingClientRect(); moveLine(t.clientX-r.left,t.clientY-r.top); },{passive:false});
canvas.addEventListener('touchend',  ()=>dragging=null);

// ── 분할 ─────────────────────────────────────────
function splitImage(){
  if(!origImg){ alert('이미지를 먼저 열어주세요!'); return; }
  const aYc=[offsetY,...hLines.slice().sort((a,b)=>a-b),offsetY+dispH];
  const aXc=[offsetX,...vLines.slice().sort((a,b)=>a-b),offsetX+dispW];
  const toX=cx=>Math.round((cx-offsetX)/scale);
  const toY=cy=>Math.round((cy-offsetY)/scale);
  const aY=aYc.map(toY), aX=aXc.map(toX);
  const tmp=document.createElement('canvas');
  const tc=tmp.getContext('2d');
  tiles=[];
  for(let r=0;r<aY.length-1;r++){
    for(let c=0;c<aX.length-1;c++){
      const x=Math.max(0,aX[c]), y=Math.max(0,aY[r]);
      const w=Math.min(origImg.width,aX[c+1])-x;
      const h=Math.min(origImg.height,aY[r+1])-y;
      tmp.width=w; tmp.height=h;
      tc.clearRect(0,0,w,h);
      tc.drawImage(origImg,x,y,w,h,0,0,w,h);
      tiles.push({ url:tmp.toDataURL('image/png'), w, h });
    }
  }
  savedSet=new Set();
  showGallery();
}

// ── 화면 전환 ─────────────────────────────────────
function showCanvas(){
  document.getElementById('screen-canvas').style.display='flex';
  document.getElementById('screen-gallery').style.display='none';
}
function showGallery(){
  document.getElementById('screen-canvas').style.display='none';
  document.getElementById('screen-gallery').style.display='flex';
  buildGallery();
}

// ── 갤러리 빌드 ──────────────────────────────────
function buildGallery(){
  const list=document.getElementById('galleryList');
  list.innerHTML='';

  tiles.forEach((tile,i)=>{
    const item=document.createElement('div');
    item.className='img-item';
    item.id=`img-${i}`;
    item.innerHTML=`
      <img src="${tile.url}" alt="${i+1}번">
      <div class="img-num">${i+1}</div>
      <div class="img-hint">⬇️ 탭해서 저장</div>
      <div class="img-saved"><span>✅ 저장됨</span></div>
    `;
    item.addEventListener('click', ()=>downloadOne(i));
    list.appendChild(item);
  });

  updateSaveCount();
  document.getElementById('galleryScroll').scrollTop=0;
}

// ── 개별 저장 ─────────────────────────────────────
function downloadOne(i){
  const a=document.createElement('a');
  a.href=tiles[i].url;
  a.download=`${i+1}.png`;
  a.click();
  savedSet.add(i);
  document.getElementById(`img-${i}`).classList.add('saved');
  updateSaveCount();
}

// ── 전체 저장 ─────────────────────────────────────
async function downloadAll(){
  for(let i=0;i<tiles.length;i++){
    downloadOne(i);
    await new Promise(r=>setTimeout(r,350));
  }
}

// ── 저장 카운트 ───────────────────────────────────
function updateSaveCount(){
  const total=tiles.length;
  const saved=savedSet.size;
  document.getElementById('saveCount').textContent=
    saved===0 ? '탭하면 저장돼요!' :
    saved===total ? '🎉 전체 저장 완료!' :
    `${saved} / ${total} 저장됨`;
}

// ── 기타 ─────────────────────────────────────────
function setStatus(msg){ statusEl.textContent=msg; }
window.addEventListener('resize',()=>{ if(!origImg)return; fitCanvas(); resetLines(); });
</script>
</body>
</html>
