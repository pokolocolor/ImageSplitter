<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>이미지 분할 저장기</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background:#1e1e2e;
  color:#cdd6f4;
  font-family:"맑은 고딕", "Apple SD Gothic Neo", sans-serif;
  display:flex;
  flex-direction:column;
  height:100dvh;
  overflow:hidden;
  user-select:none;
}

#toolbar {
  background:#313244;
  padding:10px 12px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  box-shadow:0 2px 8px #0005;
  z-index:10;
}

.btn {
  padding:10px 14px;
  border:none;
  border-radius:8px;
  font-family:inherit;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
  transition:opacity .2s, transform .1s;
  touch-action:manipulation;
}
.btn:active { opacity:.75; transform:scale(.96); }
.btn-blue   { background:#4a90d9; color:#fff; }
.btn-orange { background:#e67e22; color:#fff; }
.btn-red    { background:#e74c3c; color:#fff; }

.lbl { font-size:13px; color:#bac2de; white-space:nowrap; }

input[type=number] {
  width:46px;
  padding:8px 4px;
  border-radius:6px;
  border:1px solid #555;
  background:#1e1e2e;
  color:#cdd6f4;
  font-size:14px;
  text-align:center;
}

#canvasWrap {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
  background:#181825;
  touch-action:none;
}

#mainCanvas {
  display:block;
  cursor:crosshair;
  touch-action:none;
}

#overlay {
  position:absolute;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  color:#585b70;
  pointer-events:none;
  text-align:center;
  padding:20px;
}
#overlay .icon { font-size:56px; }
#overlay .txt  { font-size:16px; line-height:1.6; }

#statusBar {
  background:#313244;
  padding:8px 14px;
  font-size:12px;
  color:#a6adc8;
  border-top:1px solid #45475a;
  min-height:32px;
}

/* ── 모달 ── */
#modal {
  display:none;
  position:fixed;
  inset:0;
  background:#000c;
  z-index:100;
  align-items:flex-end;
  justify-content:center;
}
#modal.show { display:flex; }

#modalBox {
  background:#313244;
  border-radius:20px 20px 0 0;
  padding:20px 16px;
  width:100%;
  max-width:600px;
  max-height:90dvh;
  display:flex;
  flex-direction:column;
  gap:14px;
}

#modalHeader {
  display:flex;
  align-items:center;
  justify-content:space-between;
}
#modalHeader h2 { font-size:17px; color:#cdd6f4; }
#closeBtn {
  background:#45475a;
  border:none;
  color:#cdd6f4;
  font-size:18px;
  width:32px;
  height:32px;
  border-radius:50%;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 뷰어 */
#viewer {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  flex:1;
  overflow:hidden;
}

#viewerImg {
  width:100%;
  max-height:45dvh;
  object-fit:contain;
  border-radius:12px;
  background:#1e1e2e;
}

/* 네비게이션 */
#navRow {
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  justify-content:center;
}

.nav-btn {
  background:#45475a;
  border:none;
  color:#cdd6f4;
  font-size:22px;
  width:48px;
  height:48px;
  border-radius:50%;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  touch-action:manipulation;
  flex-shrink:0;
}
.nav-btn:active { background:#585b70; }
.nav-btn:disabled { opacity:.3; }

#pageInfo {
  font-size:16px;
  font-weight:bold;
  color:#cdd6f4;
  min-width:70px;
  text-align:center;
}

/* 썸네일 띠 */
#thumbRow {
  display:flex;
  gap:6px;
  overflow-x:auto;
  width:100%;
  padding-bottom:4px;
  scrollbar-width:none;
}
#thumbRow::-webkit-scrollbar { display:none; }

.thumb {
  flex-shrink:0;
  width:52px;
  height:52px;
  border-radius:8px;
  overflow:hidden;
  border:2px solid transparent;
  cursor:pointer;
  position:relative;
  background:#1e1e2e;
}
.thumb.active { border-color:#4a90d9; }
.thumb img { width:100%; height:100%; object-fit:cover; }
.thumb-n {
  position:absolute;
  top:2px; left:2px;
  background:#000a;
  color:#fff;
  font-size:9px;
  font-weight:bold;
  padding:1px 4px;
  border-radius:3px;
}

/* 저장 버튼 */
#saveBtn {
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:12px;
  background:#4a90d9;
  color:#fff;
  border:none;
  font-weight:bold;
  cursor:pointer;
  touch-action:manipulation;
}
#saveBtn:active { background:#357abd; }

#saveHint {
  font-size:11px;
  color:#a6adc8;
  text-align:center;
  line-height:1.6;
}
</style>
</head>
<body>

<!-- 툴바 -->
<div id="toolbar">
  <button class="btn btn-blue" onclick="openImage()">📂 열기</button>
  <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="loadImage(event)">
  <span class="lbl">열(가로):</span>
  <input type="number" id="cols" value="4" min="1" max="20">
  <span class="lbl">행(세로):</span>
  <input type="number" id="rows" value="5" min="1" max="20">
  <button class="btn btn-orange" onclick="resetLines()">🔄 초기화</button>
  <button class="btn btn-red"    onclick="splitAndSave()">✂️ 분할!</button>
</div>

<!-- 캔버스 -->
<div id="canvasWrap">
  <div id="overlay">
    <div class="icon">🖼️</div>
    <div class="txt">이미지를 열거나<br>여기에 드래그하세요</div>
  </div>
  <canvas id="mainCanvas"></canvas>
</div>

<!-- 상태바 -->
<div id="statusBar">준비 완료 — 이미지를 열어주세요!</div>

<!-- 모달 -->
<div id="modal">
  <div id="modalBox">

    <div id="modalHeader">
      <h2>💾 분할 이미지 저장</h2>
      <button id="closeBtn" onclick="closeModal()">✕</button>
    </div>

    <!-- 큰 이미지 뷰어 -->
    <div id="viewer">
      <img id="viewerImg" src="" alt="미리보기">

      <!-- 이전 / 번호 / 다음 -->
      <div id="navRow">
        <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">‹</button>
        <span id="pageInfo">1 / 20</span>
        <button class="nav-btn" id="nextBtn" onclick="navigate(1)">›</button>
      </div>

      <!-- 썸네일 띠 -->
      <div id="thumbRow"></div>
    </div>

    <!-- 저장 버튼 -->
    <button id="saveBtn" onclick="saveCurrent()">⬇️ 이 사진 저장 (1번)</button>

    <div id="saveHint">
      📌 아이폰: Safari 브라우저에서 열면 사진첩에 바로 저장돼요!<br>
      안드로이드: 다운로드 폴더 → 갤러리에서 확인하세요.
    </div>

  </div>
</div>

<script>
const canvas   = document.getElementById('mainCanvas');
const ctx      = canvas.getContext('2d');
const wrap     = document.getElementById('canvasWrap');
const statusEl = document.getElementById('statusBar');
const overlay  = document.getElementById('overlay');

let origImg = null, scale=1, offsetX=0, offsetY=0, dispW=0, dispH=0;
let hLines=[], vLines=[], dragging=null;
const SNAP=18;
let tiles=[];       // DataURL 배열
let currentIdx=0;  // 현재 보고있는 인덱스

// ── 이미지 열기 ──────────────────────────────────
function openImage(){ document.getElementById('fileInput').click(); }

function loadImage(e){ readFile(e.target.files[0]); }

function readFile(file){
  if(!file||!file.type.startsWith('image/')) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      origImg=img;
      overlay.style.display='none';
      fitCanvas(); resetLines();
      setStatus(`원본: ${img.width}×${img.height}px | 선을 드래그해서 조정하세요!`);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

wrap.addEventListener('dragover',e=>e.preventDefault());
wrap.addEventListener('drop',e=>{
  e.preventDefault();
  readFile(e.dataTransfer.files[0]);
});

// ── 캔버스 ───────────────────────────────────────
function fitCanvas(){
  const maxW=wrap.clientWidth-20, maxH=wrap.clientHeight-20;
  scale=Math.min(maxW/origImg.width, maxH/origImg.height, 1);
  dispW=Math.floor(origImg.width*scale);
  dispH=Math.floor(origImg.height*scale);
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
  offsetX=Math.floor((canvas.width-dispW)/2);
  offsetY=Math.floor((canvas.height-dispH)/2);
}

function resetLines(){
  if(!origImg) return;
  const cols=parseInt(document.getElementById('cols').value)||4;
  const rows=parseInt(document.getElementById('rows').value)||5;
  vLines=Array.from({length:cols-1},(_,i)=>offsetX+Math.floor(dispW*(i+1)/cols));
  hLines=Array.from({length:rows-1},(_,i)=>offsetY+Math.floor(dispH*(i+1)/rows));
  redraw();
}

function redraw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(origImg) ctx.drawImage(origImg,offsetX,offsetY,dispW,dispH);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1;
  ctx.strokeRect(offsetX,offsetY,dispW,dispH);
  ctx.lineWidth=2; ctx.setLineDash([8,4]);
  ctx.strokeStyle='#00cfff';
  hLines.forEach(y=>{ctx.beginPath();ctx.moveTo(offsetX,y);ctx.lineTo(offsetX+dispW,y);ctx.stroke();});
  ctx.strokeStyle='#ffdd00';
  vLines.forEach(x=>{ctx.beginPath();ctx.moveTo(x,offsetY);ctx.lineTo(x,offsetY+dispH);ctx.stroke();});
  ctx.setLineDash([]);
  const aY=[offsetY,...hLines.slice().sort((a,b)=>a-b),offsetY+dispH];
  const aX=[offsetX,...vLines.slice().sort((a,b)=>a-b),offsetX+dispW];
  ctx.font='bold 13px "맑은 고딕"';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  let n=1;
  for(let r=0;r<aY.length-1;r++)
    for(let c=0;c<aX.length-1;c++){
      const mx=(aX[c]+aX[c+1])/2, my=(aY[r]+aY[r+1])/2;
      ctx.fillStyle='rgba(0,0,0,.6)';
      ctx.beginPath(); ctx.arc(mx,my,14,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.fillText(n++,mx,my);
    }
}

// ── 선 드래그 ────────────────────────────────────
function findLine(x,y){
  for(let i=0;i<hLines.length;i++) if(Math.abs(y-hLines[i])<SNAP) return{type:'h',index:i};
  for(let i=0;i<vLines.length;i++) if(Math.abs(x-vLines[i])<SNAP) return{type:'v',index:i};
  return null;
}
function moveLine(x,y){
  if(!dragging) return;
  if(dragging.type==='h')
    hLines[dragging.index]=Math.max(offsetY+4,Math.min(y,offsetY+dispH-4));
  else
    vLines[dragging.index]=Math.max(offsetX+4,Math.min(x,offsetX+dispW-4));
  redraw();
}
function getXY(e){ const r=canvas.getBoundingClientRect(); return[e.clientX-r.left,e.clientY-r.top]; }

canvas.addEventListener('mousedown', e=>{ dragging=findLine(...getXY(e)); });
canvas.addEventListener('mousemove', e=>{
  const[x,y]=getXY(e);
  if(dragging){ moveLine(x,y); return; }
  const f=findLine(x,y);
  canvas.style.cursor=f?(f.type==='h'?'ns-resize':'ew-resize'):'crosshair';
});
canvas.addEventListener('mouseup',   ()=>dragging=null);
canvas.addEventListener('mouseleave',()=>dragging=null);

canvas.addEventListener('touchstart',e=>{ e.preventDefault(); const t=e.touches[0],r=canvas.getBoundingClientRect(); dragging=findLine(t.clientX-r.left,t.clientY-r.top); },{passive:false});
canvas.addEventListener('touchmove', e=>{ e.preventDefault(); const t=e.touches[0],r=canvas.getBoundingClientRect(); moveLine(t.clientX-r.left,t.clientY-r.top); },{passive:false});
canvas.addEventListener('touchend',  ()=>dragging=null);

// ── 분할 ─────────────────────────────────────────
function splitAndSave(){
  if(!origImg){ alert('이미지를 먼저 열어주세요!'); return; }
  const aYc=[offsetY,...hLines.slice().sort((a,b)=>a-b),offsetY+dispH];
  const aXc=[offsetX,...vLines.slice().sort((a,b)=>a-b),offsetX+dispW];
  const toX=cx=>Math.round((cx-offsetX)/scale);
  const toY=cy=>Math.round((cy-offsetY)/scale);
  const aY=aYc.map(toY), aX=aXc.map(toX);
  const tmp=document.createElement('canvas');
  const tc=tmp.getContext('2d');
  tiles=[];
  for(let r=0;r<aY.length-1;r++){
    for(let c=0;c<aX.length-1;c++){
      const x=Math.max(0,aX[c]), y=Math.max(0,aY[r]);
      const w=Math.min(origImg.width,aX[c+1])-x;
      const h=Math.min(origImg.height,aY[r+1])-y;
      tmp.width=w; tmp.height=h;
      tc.clearRect(0,0,w,h);
      tc.drawImage(origImg,x,y,w,h,0,0,w,h);
      tiles.push(tmp.toDataURL('image/png'));
    }
  }
  currentIdx=0;
  openModal();
  setStatus(`✅ ${tiles.length}장 분할 완료!`);
}

// ── 모달 ─────────────────────────────────────────
function openModal(){
  // 썸네일 생성
  const thumbRow=document.getElementById('thumbRow');
  thumbRow.innerHTML='';
  tiles.forEach((url,i)=>{
    const d=document.createElement('div');
    d.className='thumb'+(i===0?' active':'');
    d.id=`thumb-${i}`;
    d.onclick=()=>goTo(i);
    d.innerHTML=`<img src="${url}"><div class="thumb-n">${i+1}</div>`;
    thumbRow.appendChild(d);
  });
  updateViewer();
  document.getElementById('modal').classList.add('show');
}

function closeModal(){ document.getElementById('modal').classList.remove('show'); }

function goTo(i){
  currentIdx=i;
  updateViewer();
  // 썸네일 활성화
  document.querySelectorAll('.thumb').forEach((t,idx)=>{
    t.classList.toggle('active', idx===i);
  });
  // 썸네일 스크롤
  const thumb=document.getElementById(`thumb-${i}`);
  if(thumb) thumb.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function navigate(dir){
  const next=currentIdx+dir;
  if(next<0||next>=tiles.length) return;
  goTo(next);
}

function updateViewer(){
  const total=tiles.length;
  document.getElementById('viewerImg').src=tiles[currentIdx];
  document.getElementById('pageInfo').textContent=`${currentIdx+1} / ${total}`;
  document.getElementById('saveBtn').textContent=`⬇️ ${currentIdx+1}번 사진 저장`;
  document.getElementById('prevBtn').disabled=currentIdx===0;
  document.getElementById('nextBtn').disabled=currentIdx===total-1;
}

// ── 현재 사진 저장 ────────────────────────────────
function saveCurrent(){
  const a=document.createElement('a');
  a.href=tiles[currentIdx];
  a.download=`${currentIdx+1}.png`;
  a.click();
  setStatus(`💾 ${currentIdx+1}번 저장! (${currentIdx+1}/${tiles.length})`);

  // 다음 장으로 자동 이동
  if(currentIdx < tiles.length-1){
    setTimeout(()=>navigate(1), 400);
  } else {
    setTimeout(()=>setStatus(`🎉 모든 사진 저장 완료!`), 400);
  }
}

// ── 기타 ─────────────────────────────────────────
function setStatus(msg){ statusEl.textContent=msg; }
window.addEventListener('resize',()=>{ if(!origImg) return; fitCanvas(); resetLines(); });
</script>
</body>
</html>
