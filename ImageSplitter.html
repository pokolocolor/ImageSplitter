<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f0ea">
<title>젬 있는 세상</title>
<style>
:root{
  --bg:#f5f0ea;--bg-card:#fff;--text:#3a3226;--text-sub:#7a7062;--text-dim:#b0a898;
  --primary:#c9a96e;--primary-light:#e8d5b0;--accent:#8b6b3d;
  --border:#e0d6c8;--shadow:0 4px 20px rgba(60,50,30,.10);
  --radius:18px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"맑은 고딕","Apple SD Gothic Neo","Segoe UI",sans-serif;display:flex;flex-direction:column;height:100dvh;user-select:none;-webkit-user-select:none;}

.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ─── HOME ─── */
#screen-home{background:var(--bg);align-items:center;justify-content:flex-start;}
.home-scroll{width:100%;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;padding:24px 16px calc(24px + var(--safe-bottom));gap:20px;}
.logo-area{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:12px;}
.logo-img{width:120px;height:120px;border-radius:28px;object-fit:cover;box-shadow:0 4px 24px rgba(120,90,40,.18);}
.logo-title{font-size:26px;font-weight:900;color:var(--accent);letter-spacing:-0.5px;}
.logo-sub{font-size:13px;color:var(--text-sub);font-weight:500;}
.menu-grid{width:100%;max-width:400px;display:flex;flex-direction:column;gap:14px;}
.menu-card{display:flex;align-items:center;gap:16px;background:var(--bg-card);border-radius:var(--radius);padding:20px 18px;box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;transition:transform .12s,box-shadow .15s;text-decoration:none;color:var(--text);touch-action:manipulation;}
.menu-card:active{transform:scale(.97);box-shadow:0 2px 10px rgba(60,50,30,.08);}
.card-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.card-icon.char{background:linear-gradient(135deg,#ffecd2,#fcb69f);}
.card-icon.emoti{background:linear-gradient(135deg,#d4fc79,#96e6a1);}
.card-icon.cut{background:linear-gradient(135deg,#a1c4fd,#c2e9fb);}
.card-body{display:flex;flex-direction:column;gap:3px;}
.card-title{font-size:16px;font-weight:800;color:var(--text);}
.card-desc{font-size:12px;color:var(--text-sub);font-weight:500;}
.card-arrow{margin-left:auto;font-size:18px;color:var(--text-dim);}
.footer-txt{font-size:11px;color:var(--text-dim);text-align:center;padding-bottom:4px;}

/* ─── EDITOR ─── */
#screen-editor{background:#f8f6f2;}
#topBar{background:var(--bg-card);padding:4px 6px;display:flex;flex-direction:column;gap:3px;box-shadow:0 2px 8px rgba(60,50,30,.08);z-index:10;flex-shrink:0;border-bottom:1px solid var(--border);}
.top-row,.preset-row{display:flex;align-items:center;justify-content:center;flex-wrap:nowrap;}
.top-row{gap:4px;}
.preset-row{gap:3px;}

.t-btn{padding:4px 7px;border:none;border-radius:7px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;touch-action:manipulation;transition:opacity .1s,transform .08s;}
.t-btn:active{opacity:.7;transform:scale(.94);}
.t-back{background:transparent;color:var(--accent);font-size:12px;font-weight:800;padding:4px 5px;}
.t-open{background:var(--primary);color:#fff;}
.t-split{background:#e07850;color:#fff;}

.t-preset{background:var(--primary-light);color:var(--accent);font-size:11px;padding:4px 8px;border:2px solid transparent;border-radius:7px;font-weight:700;cursor:pointer;transition:all .12s;touch-action:manipulation;}
.t-preset:active{opacity:.7;}
.t-preset.active{background:var(--primary);color:#fff;border-color:var(--accent);}

.t-sm{width:22px;height:22px;border:none;border-radius:5px;background:var(--border);color:var(--text);font-size:10px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;padding:0;}
.t-sm:active{background:var(--primary-light);}

.t-lbl{font-size:10px;color:var(--text-sub);white-space:nowrap;}
.num-ctrl{display:flex;align-items:center;gap:1px;background:var(--bg);border-radius:6px;padding:1px 2px;border:1px solid var(--border);}
.num-ctrl input[type=number]{width:20px;padding:1px 0;border:none;border-radius:3px;background:transparent;color:var(--text);font-size:13px;font-weight:700;text-align:center;font-family:inherit;-moz-appearance:textfield;}
.num-ctrl input::-webkit-outer-spin-button,.num-ctrl input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.t-sep{width:1px;height:18px;background:var(--border);flex-shrink:0;}

#canvasArea{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#f0ece4;}
#mainCanvas{display:block;touch-action:none;}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(245,240,234,.85);gap:12px;pointer-events:none;}
.overlay-icon{font-size:48px;}
.overlay-msg{font-size:14px;color:var(--text-sub);font-weight:600;text-align:center;line-height:1.5;}
#statusBar{background:var(--bg-card);padding:4px 10px;font-size:10px;color:var(--text-sub);text-align:center;border-top:1px solid var(--border);flex-shrink:0;}

/* ─── GALLERY ─── */
#screen-gallery{background:#f8f6f2;}
.gal-header{background:var(--bg-card);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(60,50,30,.08);border-bottom:1px solid var(--border);flex-shrink:0;}
.gal-title{font-size:15px;font-weight:800;color:var(--text);}
.gal-count{font-size:12px;color:var(--text-sub);font-weight:600;background:var(--primary-light);padding:3px 10px;border-radius:20px;}
.gal-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;}
.gal-grid{display:grid;gap:8px;}
.gal-grid img{width:100%;border-radius:10px;border:2px solid var(--border);cursor:pointer;transition:transform .1s,border-color .15s;background:#fff;}
.gal-grid img:active{transform:scale(.95);}
.gal-grid img.saved{border-color:var(--primary);opacity:.75;}
.gal-bottom{background:var(--bg-card);padding:8px 10px calc(8px + var(--safe-bottom));display:flex;gap:8px;justify-content:center;border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.btn-gal{padding:10px 16px;border:none;border-radius:12px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;touch-action:manipulation;transition:opacity .12s;}
.btn-gal:active{opacity:.7;}
.btn-gal.back{background:var(--border);color:var(--text);}
.btn-gal.home{background:var(--primary-light);color:var(--accent);}
.btn-gal.dl{background:var(--primary);color:#fff;}
.btn-gal.zip{background:var(--accent);color:#fff;}

#dlProgress{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:14px;}
#dlProgress.show{display:flex;}
.dl-box{background:var(--bg-card);border-radius:20px;padding:28px 32px;display:flex;flex-direction:column;align-items:center;gap:12px;min-width:220px;box-shadow:0 8px 40px rgba(0,0,0,.25);}
.dl-text{font-size:14px;font-weight:700;color:var(--text);}
.dl-bar-bg{width:100%;height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.dl-bar{height:100%;background:var(--primary);border-radius:4px;transition:width .3s;}

/* ─── responsive ─── */
@media(max-width:340px){
  #topBar{padding:3px 4px;gap:2px;}
  .top-row{gap:2px;}.preset-row{gap:2px;}
  .t-btn{padding:3px 5px;font-size:10px;}
  .t-back{padding:3px 4px;font-size:11px;}
  .t-preset{padding:3px 6px;font-size:10px;}
  .t-sm{width:20px;height:20px;font-size:9px;}
  .num-ctrl input[type=number]{width:18px;font-size:12px;}
  .t-lbl{font-size:9px;}
}
@media(min-width:601px){
  .home-scroll{max-width:520px;padding:40px 24px;}
  .logo-img{width:140px;height:140px;}
  .logo-title{font-size:30px;}
  .menu-card{padding:24px 22px;}.card-icon{width:58px;height:58px;font-size:28px;}
  .card-title{font-size:18px;}
  #topBar{padding:8px 14px;gap:6px;}
  .t-btn{padding:8px 14px;font-size:14px;}
  .t-preset{padding:6px 14px;font-size:13px;}
  .t-sm{width:30px;height:30px;font-size:13px;}
  .num-ctrl input[type=number]{width:28px;font-size:16px;}
  .t-lbl{font-size:12px;}
}
@media(min-width:1024px){
  .menu-grid{max-width:500px;}
  .home-scroll{max-width:600px;}
}
</style>
</head>
<body>

<!-- ═══════ HOME ═══════ -->
<div id="screen-home" class="screen active">
  <div class="home-scroll">
    <div class="logo-area">
      <img class="logo-img" src="https://github.com/user-attachments/assets/364738bf-2bc9-49d1-b86c-b69325257320" alt="젬 있는 세상">
      <div class="logo-title">젬 있는 세상</div>
      <div class="logo-sub">Google Gem 공유 플랫폼</div>
    </div>
    <div class="menu-grid">
      <a class="menu-card" href="https://gemini.google.com/gem/1AJdDfAyaB1x60PV0gjAdSaeBoityoLbB?usp=sharing" target="_blank" rel="noopener">
        <div class="card-icon char">🎭</div>
        <div class="card-body"><div class="card-title">캐릭터 메이커</div><div class="card-desc">AI로 나만의 캐릭터를 만들어 보세요</div></div>
        <div class="card-arrow">›</div>
      </a>
      <a class="menu-card" href="https://gemini.google.com/gem/1iYKFc8k1AyT5v4kTHuqPHYd1zpIp6zo9?usp=sharing" target="_blank" rel="noopener">
        <div class="card-icon emoti">😊</div>
        <div class="card-body"><div class="card-title">이모티콘 메이커</div><div class="card-desc">귀여운 이모티콘을 AI로 제작하세요</div></div>
        <div class="card-arrow">›</div>
      </a>
      <div class="menu-card" onclick="goScreen('screen-editor')">
        <div class="card-icon cut">✂️</div>
        <div class="card-body"><div class="card-title">이모티콘 자르기</div><div class="card-desc">이미지를 원하는 크기로 분할 저장</div></div>
        <div class="card-arrow">›</div>
      </div>
    </div>
    <div class="footer-txt">© 젬 있는 세상 · Google Gem 공유</div>
  </div>
</div>

<!-- ═══════ EDITOR ═══════ -->
<div id="screen-editor" class="screen">
  <div id="topBar">
    <!-- 1행: 홈 + 열기 + 열/행 + 분할 -->
    <div class="top-row">
      <button class="t-btn t-back" onclick="goScreen('screen-home')">←홈</button>
      <button class="t-btn t-open" onclick="openImage()">📂열기</button>
      <div class="t-sep"></div>
      <span class="t-lbl">열</span>
      <div class="num-ctrl">
        <button class="t-sm" onclick="adjustVal('cols',-1)">◀</button>
        <input type="number" id="cols" value="4" min="1" max="20" inputmode="numeric">
        <button class="t-sm" onclick="adjustVal('cols',1)">▶</button>
      </div>
      <span class="t-lbl">행</span>
      <div class="num-ctrl">
        <button class="t-sm" onclick="adjustVal('rows',-1)">◀</button>
        <input type="number" id="rows" value="5" min="1" max="20" inputmode="numeric">
        <button class="t-sm" onclick="adjustVal('rows',1)">▶</button>
      </div>
      <div class="t-sep"></div>
      <button class="t-btn t-split" onclick="splitImage()">✂분할</button>
    </div>
    <!-- 2행: 프리셋 -->
    <div class="preset-row">
      <button class="t-preset" data-c="2" data-r="2" onclick="applyPreset(this)">2×2</button>
      <button class="t-preset" data-c="2" data-r="3" onclick="applyPreset(this)">2×3</button>
      <button class="t-preset" data-c="3" data-r="3" onclick="applyPreset(this)">3×3</button>
      <button class="t-preset" data-c="3" data-r="4" onclick="applyPreset(this)">3×4</button>
      <button class="t-preset active" data-c="4" data-r="5" onclick="applyPreset(this)">4×5</button>
    </div>
  </div>

  <div id="canvasArea">
    <canvas id="mainCanvas"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlay-icon">🖼️</div>
      <div class="overlay-msg">📂 열기를 눌러<br>이미지를 불러오세요</div>
    </div>
  </div>
  <div id="statusBar">이미지를 불러와 주세요</div>
</div>

<!-- ═══════ GALLERY ═══════ -->
<div id="screen-gallery" class="screen">
  <div class="gal-header">
    <div class="gal-title">분할 결과</div>
    <div class="gal-count" id="saveCount">0 / 0 저장됨</div>
  </div>
  <div class="gal-scroll"><div class="gal-grid" id="galGrid"></div></div>
  <div class="gal-bottom">
    <button class="btn-gal back" onclick="goScreen('screen-editor')">← 편집</button>
    <button class="btn-gal home" onclick="goScreen('screen-home')">🏠 홈</button>
    <button class="btn-gal dl" onclick="downloadAllSeq()">💾 전체저장</button>
    <button class="btn-gal zip" onclick="downloadZip()">📦 ZIP</button>
  </div>
</div>

<!-- ═══════ Download Progress ═══════ -->
<div id="dlProgress">
  <div class="dl-box">
    <div class="dl-text" id="dlText">저장 중...</div>
    <div class="dl-bar-bg"><div class="dl-bar" id="dlBar" style="width:0%"></div></div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="loadImage(event)">

<script>
const cv=document.getElementById('mainCanvas'),ctx=cv.getContext('2d');
const colsIn=document.getElementById('cols'),rowsIn=document.getElementById('rows');
const overlay=document.getElementById('overlay'),statusBar=document.getElementById('statusBar');
let origImg=null,scale=1,offX=0,offY=0;
let linesX=[],linesY=[];
const SNAP=22;
let tiles=[],savedSet=new Set(),gridCols=4,gridRows=5;

function goScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='screen-editor'&&origImg) setTimeout(()=>{fitCanvas();redraw();},50);
}

function applyPreset(btn){
  document.querySelectorAll('.t-preset').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  colsIn.value=btn.dataset.c;rowsIn.value=btn.dataset.r;
  gridCols=+btn.dataset.c;gridRows=+btn.dataset.r;
  if(origImg){resetLines();redraw();}
}
function adjustVal(id,d){
  const inp=document.getElementById(id);
  let v=Math.min(20,Math.max(1,(+inp.value||1)+d));
  inp.value=v;
  if(id==='cols')gridCols=v;else gridRows=v;
  syncPreset();
  if(origImg){resetLines();redraw();}
}
function syncPreset(){
  document.querySelectorAll('.t-preset').forEach(b=>{
    b.classList.toggle('active',+b.dataset.c===gridCols&&+b.dataset.r===gridRows);
  });
}
colsIn.addEventListener('change',()=>{gridCols=Math.min(20,Math.max(1,+colsIn.value||1));colsIn.value=gridCols;syncPreset();if(origImg){resetLines();redraw();}});
rowsIn.addEventListener('change',()=>{gridRows=Math.min(20,Math.max(1,+rowsIn.value||1));rowsIn.value=gridRows;syncPreset();if(origImg){resetLines();redraw();}});

function openImage(){document.getElementById('fileInput').click();}
function loadImage(e){const f=e.target.files[0];if(f)readFile(f);}
function readFile(f){
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{origImg=img;overlay.style.display='none';fitCanvas();resetLines();redraw();
      statusBar.textContent=`${img.naturalWidth} × ${img.naturalHeight} px`;};
    img.src=ev.target.result;
  };r.readAsDataURL(f);
}

let resizeTimer;
function fitCanvas(){
  if(!origImg)return;
  const area=document.getElementById('canvasArea');
  const W=area.clientWidth,H=area.clientHeight;
  scale=Math.min(W/origImg.naturalWidth,H/origImg.naturalHeight,.95);
  const cw=Math.round(origImg.naturalWidth*scale),ch=Math.round(origImg.naturalHeight*scale);
  cv.width=cw;cv.height=ch;
  offX=(W-cw)/2;offY=(H-ch)/2;
  cv.style.marginLeft=offX+'px';cv.style.marginTop=offY+'px';
}
window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{if(origImg){fitCanvas();redraw();}},150);});

function resetLines(){
  linesX=[];linesY=[];
  for(let i=1;i<gridCols;i++) linesX.push(Math.round(origImg.naturalWidth*i/gridCols*scale));
  for(let i=1;i<gridRows;i++) linesY.push(Math.round(origImg.naturalHeight*i/gridRows*scale));
}

function redraw(){
  if(!origImg)return;
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.drawImage(origImg,0,0,cv.width,cv.height);
  ctx.strokeStyle='rgba(255,80,80,.8)';ctx.lineWidth=2;
  linesX.forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke();});
  linesY.forEach(y=>{ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke();});
  const xs=[0,...linesX,cv.width],ys=[0,...linesY,cv.height];
  let n=1;
  ctx.font=`bold ${Math.max(10,Math.min(18,cv.width/gridCols/3.5))}px sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let r=0;r<ys.length-1;r++) for(let c=0;c<xs.length-1;c++){
    const cx=(xs[c]+xs[c+1])/2,cy=(ys[r]+ys[r+1])/2;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(cx-12,cy-9,24,18);
    ctx.fillStyle='#fff';ctx.fillText(n++,cx,cy);
  }
}

let dragLine=null;
function findLine(px,py){
  for(let i=0;i<linesX.length;i++) if(Math.abs(px-linesX[i])<SNAP) return{axis:'x',idx:i};
  for(let i=0;i<linesY.length;i++) if(Math.abs(py-linesY[i])<SNAP) return{axis:'y',idx:i};
  return null;
}
function evPos(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
cv.addEventListener('mousedown',e=>{dragLine=findLine(...Object.values(evPos(e)));});
cv.addEventListener('touchstart',e=>{dragLine=findLine(...Object.values(evPos(e)));},{passive:true});
function moveLine(e){
  if(!dragLine)return;const p=evPos(e);
  if(dragLine.axis==='x') linesX[dragLine.idx]=Math.max(4,Math.min(cv.width-4,p.x));
  else linesY[dragLine.idx]=Math.max(4,Math.min(cv.height-4,p.y));
  redraw();
}
cv.addEventListener('mousemove',moveLine);
cv.addEventListener('touchmove',e=>{e.preventDefault();moveLine(e);},{passive:false});
window.addEventListener('mouseup',()=>{dragLine=null;});
window.addEventListener('touchend',()=>{dragLine=null;});

function splitImage(){
  if(!origImg)return;
  tiles=[];savedSet.clear();
  const rxs=[0,...linesX.map(v=>Math.round(v/cv.width*origImg.naturalWidth)),origImg.naturalWidth];
  const rys=[0,...linesY.map(v=>Math.round(v/cv.height*origImg.naturalHeight)),origImg.naturalHeight];
  for(let r=0;r<rys.length-1;r++) for(let c=0;c<rxs.length-1;c++){
    const sx=rxs[c],sy=rys[r],sw=rxs[c+1]-rxs[c],sh=rys[r+1]-rys[r];
    const tc=document.createElement('canvas');tc.width=sw;tc.height=sh;
    tc.getContext('2d').drawImage(origImg,sx,sy,sw,sh,0,0,sw,sh);
    tiles.push(tc.toDataURL('image/png'));
  }
  goScreen('screen-gallery');buildGallery();
}

function buildGallery(){
  const grid=document.getElementById('galGrid');
  grid.innerHTML='';
  grid.style.gridTemplateColumns=`repeat(${gridCols},1fr)`;
  tiles.forEach((src,i)=>{
    const img=document.createElement('img');img.src=src;img.loading='lazy';
    img.onclick=()=>downloadOne(i);
    grid.appendChild(img);
  });
  updateSaveCount();
}
function updateSaveCount(){
  document.getElementById('saveCount').textContent=`${savedSet.size} / ${tiles.length} 저장됨`;
  document.querySelectorAll('#galGrid img').forEach((img,i)=>{img.classList.toggle('saved',savedSet.has(i));});
}

function dataURLtoBlob(dataURL){
  const arr=dataURL.split(','),mime=arr[0].match(/:(.*?);/)[1];
  const b=atob(arr[1]),ab=new ArrayBuffer(b.length),ia=new Uint8Array(ab);
  for(let i=0;i<b.length;i++) ia[i]=b.charCodeAt(i);
  return new Blob([ab],{type:mime});
}
function downloadOne(i){
  const blob=dataURLtoBlob(tiles[i]);
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`emoticon_${String(i+1).padStart(2,'0')}.png`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  savedSet.add(i);updateSaveCount();
}
function downloadAllSeq(){
  const prog=document.getElementById('dlProgress'),txt=document.getElementById('dlText'),bar=document.getElementById('dlBar');
  prog.classList.add('show');let idx=0;
  function next(){
    if(idx>=tiles.length){prog.classList.remove('show');updateSaveCount();return;}
    txt.textContent=`저장 중... ${idx+1} / ${tiles.length}`;
    bar.style.width=((idx+1)/tiles.length*100)+'%';
    downloadOne(idx);idx++;setTimeout(next,800);
  }next();
}
function downloadZip(){
  const prog=document.getElementById('dlProgress'),txt=document.getElementById('dlText'),bar=document.getElementById('dlBar');
  prog.classList.add('show');txt.textContent='ZIP 준비 중...';bar.style.width='0%';
  function doZip(){
    const zip=new JSZip();
    tiles.forEach((d,i)=>{const b64=d.split(',')[1];zip.file(`emoticon_${String(i+1).padStart(2,'0')}.png`,b64,{base64:true});});
    zip.generateAsync({type:'blob'},meta=>{
      bar.style.width=meta.percent.toFixed(0)+'%';
      txt.textContent=`압축 중... ${meta.percent.toFixed(0)}%`;
    }).then(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download='emoticons.zip';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),1000);
      tiles.forEach((_,i)=>savedSet.add(i));
      updateSaveCount();prog.classList.remove('show');
    });
  }
  if(typeof JSZip==='undefined'){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onload=doZip;document.head.appendChild(s);
  }else doZip();
}
</script>
