<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>나만의 이모티콘 만들기</title>
<style>
:root {
  --primary:#7c3aed;
  --primary-light:#a78bfa;
  --primary-dark:#5b21b6;
  --accent:#f472b6;
  --accent2:#38bdf8;
  --bar-bg:rgba(26,26,46,.95);
  --bg-deep:#0f0f23;
  --bg-dark:#1a1a2e;
  --bg-card:#16213e;
  --text:#e2e8f0;
  --text-dim:#94a3b8;
  --text-sub:#cbd5e1;
  --border:rgba(124,58,237,.25);
  --glow:rgba(124,58,237,.15);
  --safe-bottom:env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg-deep);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"맑은 고딕","Apple SD Gothic Neo","Segoe UI",sans-serif;
  display:flex;flex-direction:column;height:100dvh;
  user-select:none;-webkit-user-select:none;
}

/* ── 앱 헤더 ── */
#appHeader{
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);
  padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 20px rgba(124,58,237,.1);
  z-index:20;
}
.app-logo{
  display:flex;align-items:center;gap:8px;
}
.app-logo .logo-icon{
  width:32px;height:32px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  box-shadow:0 2px 12px rgba(124,58,237,.3);
}
.app-logo .logo-text{
  font-size:15px;font-weight:800;
  background:linear-gradient(135deg,var(--primary-light),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:-0.3px;
}

.btn-gem{
  padding:7px 14px;border:none;border-radius:20px;
  background:linear-gradient(135deg,var(--accent),#e879a8);
  color:#fff;font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;
  box-shadow:0 2px 12px rgba(244,114,182,.3);
  transition:all .2s;touch-action:manipulation;
  display:flex;align-items:center;gap:5px;
  text-decoration:none;
}
.btn-gem:active{transform:scale(.94);opacity:.8}

/* ── 상단바 (편집 도구) ── */
#topBar{
  background:var(--bar-bg);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:6px 8px;
  display:flex;flex-direction:column;gap:5px;
  box-shadow:0 2px 16px rgba(0,0,0,.3);
  z-index:10;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.top-row{
  display:flex;align-items:center;gap:6px;
  justify-content:center;flex-wrap:nowrap;
}
.preset-row{
  display:flex;align-items:center;gap:5px;justify-content:center;
}

/* ── 버튼 ── */
.btn{
  padding:7px 12px;border:none;border-radius:10px;
  font-family:inherit;font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;
  transition:all .15s;touch-action:manipulation;
}
.btn:active{opacity:.7;transform:scale(.94)}
.btn-blue{
  background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;
  box-shadow:0 2px 8px rgba(59,130,246,.25);
}
.btn-red{
  background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;
  box-shadow:0 2px 8px rgba(239,68,68,.25);
}
.btn-green{
  background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;
  box-shadow:0 2px 8px rgba(34,197,94,.25);
}

.btn-preset{
  background:var(--bg-card);color:var(--primary-light);
  font-size:12px;padding:6px 12px;
  border:1.5px solid var(--border);border-radius:20px;
  font-weight:700;cursor:pointer;
  transition:all .15s;touch-action:manipulation;
}
.btn-preset:active{opacity:.7;transform:scale(.94)}
.btn-preset.active{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;border-color:var(--primary-light);
  box-shadow:0 0 12px rgba(124,58,237,.35);
}

.btn-sm{
  width:22px;height:22px;padding:0;
  border:none;border-radius:6px;
  background:var(--bg-card);color:var(--text-sub);
  font-size:10px;line-height:1;
  cursor:pointer;display:flex;
  align-items:center;justify-content:center;
  touch-action:manipulation;flex-shrink:0;
  border:1px solid var(--border);
}
.btn-sm:active{background:var(--primary-dark);color:#fff}

.lbl{font-size:12px;color:var(--text-dim);white-space:nowrap}

/* ── 숫자 컨트롤 ── */
.num-control{
  display:flex;align-items:center;gap:2px;
  background:var(--bg-card);border-radius:8px;
  padding:2px 3px;border:1px solid var(--border);
}
.num-control input[type=number]{
  width:24px;padding:1px 0;border:none;border-radius:4px;
  background:transparent;color:var(--text);
  font-size:14px;font-weight:700;text-align:center;
  font-family:inherit;-moz-appearance:textfield;
}
.num-control input::-webkit-outer-spin-button,
.num-control input::-webkit-inner-spin-button{-webkit-appearance:none}

.sep{width:1px;height:22px;background:var(--border);flex-shrink:0}

/* ── 캔버스 화면 ── */
#screen-canvas{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#canvasWrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;touch-action:none;min-height:0;
  background:radial-gradient(ellipse at center,#1a1a2e 0%,#0f0f23 100%);
}
#mainCanvas{display:block;cursor:crosshair;touch-action:none}
#overlay{
  position:absolute;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  color:#4a4a6a;pointer-events:none;text-align:center;padding:20px;
}
#overlay .icon{
  font-size:56px;
  filter:drop-shadow(0 4px 12px rgba(124,58,237,.2));
}
#overlay .txt{font-size:14px;line-height:1.8;color:#5a5a7a}
#overlay .txt strong{color:var(--primary-light)}

#statusBar{
  background:var(--bar-bg);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:6px 12px;
  padding-bottom:calc(6px + var(--safe-bottom));
  font-size:11px;color:var(--text-dim);
  border-top:1px solid var(--border);flex-shrink:0;
}

/* ── 갤러리 화면 ── */
#screen-gallery{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0}
#galleryHeader{
  background:var(--bar-bg);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;box-shadow:0 2px 16px rgba(0,0,0,.3);
  border-bottom:1px solid var(--border);
}
#galleryHeader h2{font-size:14px;font-weight:700}
#saveCount{
  font-size:11px;
  color:var(--accent2);
  background:rgba(56,189,248,.1);
  padding:3px 10px;border-radius:20px;
}

#galleryScroll{
  flex:1;overflow-y:auto;
  background:radial-gradient(ellipse at center,#1a1a2e 0%,#0f0f23 100%);
  -webkit-overflow-scrolling:touch;padding:8px;min-height:0;
}
#galleryGrid{display:grid;gap:4px;width:100%}

.img-item{
  position:relative;width:100%;background:#000;
  border-radius:6px;cursor:pointer;overflow:hidden;
  border:1px solid rgba(124,58,237,.1);
  transition:border-color .2s;
}
.img-item:active{border-color:var(--primary-light)}
.img-item img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:opacity .2s;
}
.img-num{
  position:absolute;top:3px;left:3px;
  background:rgba(0,0,0,.75);color:#fff;
  font-size:10px;font-weight:700;
  padding:1px 5px;border-radius:4px;
  pointer-events:none;z-index:2;
  backdrop-filter:blur(4px);
}
.img-hint{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.85));
  color:#fff;font-size:9px;font-weight:700;
  text-align:center;padding:12px 0 4px;
  pointer-events:none;z-index:2;transition:opacity .3s;
}
.img-saved{
  display:none;position:absolute;inset:0;
  background:rgba(34,197,94,.2);
  align-items:center;justify-content:center;
  pointer-events:none;z-index:3;
}
.img-saved span{
  background:rgba(34,197,94,.9);color:#fff;
  font-size:12px;font-weight:700;
  padding:3px 10px;border-radius:50px;
}
.img-item.saved .img-saved{display:flex}
.img-item.saved .img-hint{opacity:0}
.img-item.saved img{opacity:.65}

#galleryBottom{
  background:var(--bar-bg);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:8px 10px;
  padding-bottom:calc(8px + var(--safe-bottom));
  display:flex;gap:8px;flex-shrink:0;
  border-top:1px solid var(--border);
}
#galleryBottom .btn{flex:1;text-align:center}

/* ══ 반응형 ══ */
@media(max-width:360px){
  #appHeader{padding:8px 10px}
  .app-logo .logo-icon{width:28px;height:28px;font-size:15px;border-radius:8px}
  .app-logo .logo-text{font-size:13px}
  .btn-gem{padding:6px 10px;font-size:11px}
  #topBar{padding:4px 5px;gap:4px}
  .top-row{gap:4px}
  .preset-row{gap:3px}
  .btn{padding:6px 8px;font-size:12px}
  .btn-preset{padding:5px 9px;font-size:11px}
  .btn-sm{width:20px;height:20px;font-size:9px}
  .num-control input[type=number]{width:22px;font-size:13px}
  .lbl{font-size:11px}
}

@media(min-width:601px){
  #appHeader{padding:12px 20px}
  .app-logo .logo-icon{width:38px;height:38px;font-size:22px;border-radius:12px}
  .app-logo .logo-text{font-size:18px}
  .btn-gem{padding:9px 20px;font-size:14px}
  #topBar{padding:10px 16px;gap:8px}
  .top-row{gap:10px}
  .preset-row{gap:8px}
  .btn{padding:10px 18px;font-size:15px}
  .btn-preset{padding:8px 16px;font-size:14px}
  .btn-sm{width:28px;height:28px;font-size:12px}
  .num-control input[type=number]{width:30px;font-size:16px}
  .lbl{font-size:13px}
  #galleryScroll{padding:14px}
  #galleryGrid{gap:6px}
  .img-num{font-size:12px;padding:2px 7px;top:5px;left:5px}
  .img-hint{font-size:11px;padding:16px 0 6px}
  .img-saved span{font-size:15px;padding:5px 14px}
  #statusBar{font-size:12px;padding:8px 16px}
  #galleryHeader{padding:12px 18px}
  #galleryHeader h2{font-size:16px}
  #overlay .icon{font-size:64px}
  #overlay .txt{font-size:16px}
}

@media(min-width:1024px){
  #galleryScroll{padding:20px;max-width:1100px;margin:0 auto;width:100%}
  #galleryGrid{gap:8px}
}

@media(max-height:400px) and (orientation:landscape){
  #appHeader{padding:4px 10px}
  .app-logo .logo-icon{width:24px;height:24px;font-size:14px}
  .app-logo .logo-text{font-size:12px}
  .btn-gem{padding:4px 10px;font-size:10px}
  #topBar{padding:3px 8px;gap:3px;flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:center}
  .top-row,.preset-row{gap:4px}
  .btn{padding:5px 8px;font-size:11px}
  .btn-preset{padding:4px 8px;font-size:10px}
  .btn-sm{width:18px;height:18px;font-size:8px}
  .num-control input[type=number]{font-size:12px}
  .lbl{font-size:10px}
  #statusBar{padding:4px 8px;font-size:10px}
  #galleryHeader{padding:6px 10px}
  #galleryBottom{padding:5px 8px}
}

/* ── 파티클 배경 (순수 CSS) ── */
#particles{
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
}
#particles i{
  position:absolute;
  width:4px;height:4px;
  background:var(--primary);
  border-radius:50%;
  opacity:0;
  animation:float 6s infinite ease-in-out;
}
#particles i:nth-child(1){left:10%;animation-delay:0s;animation-duration:7s}
#particles i:nth-child(2){left:25%;animation-delay:1.2s;animation-duration:5s}
#particles i:nth-child(3){left:40%;animation-delay:0.5s;animation-duration:8s}
#particles i:nth-child(4){left:55%;animation-delay:2s;animation-duration:6s}
#particles i:nth-child(5){left:70%;animation-delay:0.8s;animation-duration:7.5s}
#particles i:nth-child(6){left:85%;animation-delay:1.5s;animation-duration:5.5s}
#particles i:nth-child(7){left:15%;animation-delay:2.5s;animation-duration:6.5s;background:var(--accent)}
#particles i:nth-child(8){left:60%;animation-delay:0.3s;animation-duration:8.5s;background:var(--accent2)}
@keyframes float{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  20%{opacity:.4}
  80%{opacity:.2}
  100%{transform:translateY(-20vh) scale(1);opacity:0}
}
</style>
</head>
<body>

<!-- 배경 파티클 -->
<div id="particles"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>

<!-- ── 앱 헤더 ── -->
<div id="appHeader">
  <div class="app-logo">
    <div class="logo-icon">😎</div>
    <span class="logo-text">나만의 이모티콘 만들기</span>
  </div>
  <a class="btn-gem" href="https://gemini.google.com/gem/1iYKFc8k1AyT5v4kTHuqPHYd1zpIp6zo9?usp=sharing" target="_blank" rel="noopener">
    ✨ 이모티콘 만들기
  </a>
</div>

<!-- ── 상단바 (편집 도구) ── -->
<div id="topBar">
  <div class="top-row">
    <button class="btn btn-blue" onclick="openImage()">📂 열기</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="loadImage(event)">
    <div class="sep"></div>
    <span class="lbl">열</span>
    <div class="num-control">
      <button class="btn-sm" onclick="adjustVal('cols',-1)">◀</button>
      <input type="number" id="cols" value="4" min="1" max="20" inputmode="numeric">
      <button class="btn-sm" onclick="adjustVal('cols',1)">▶</button>
    </div>
    <span class="lbl">행</span>
    <div class="num-control">
      <button class="btn-sm" onclick="adjustVal('rows',-1)">◀</button>
      <input type="number" id="rows" value="5" min="1" max="20" inputmode="numeric">
      <button class="btn-sm" onclick="adjustVal('rows',1)">▶</button>
    </div>
    <div class="sep"></div>
    <button class="btn btn-red" onclick="splitImage()">✂️ 분할</button>
  </div>
  <div class="preset-row">
    <button class="btn btn-preset" data-cols="2" data-rows="2" onclick="applyPreset(this)">2×2</button>
    <button class="btn btn-preset" data-cols="2" data-rows="3" onclick="applyPreset(this)">2×3</button>
    <button class="btn btn-preset" data-cols="3" data-rows="3" onclick="applyPreset(this)">3×3</button>
    <button class="btn btn-preset" data-cols="3" data-rows="4" onclick="applyPreset(this)">3×4</button>
    <button class="btn btn-preset active" data-cols="4" data-rows="5" onclick="applyPreset(this)">4×5</button>
  </div>
</div>

<!-- ── 캔버스 화면 ── -->
<div id="screen-canvas">
  <div id="canvasWrap">
    <div id="overlay">
      <div class="icon">🎨</div>
      <div class="txt">
        <strong>이미지를 열거나 드래그</strong>하세요<br>
        분할해서 이모티콘으로 저장!
      </div>
    </div>
    <canvas id="mainCanvas"></canvas>
  </div>
  <div id="statusBar">준비 완료 — 이미지를 열어주세요!</div>
</div>

<!-- ── 갤러리 화면 ── -->
<div id="screen-gallery">
  <div id="galleryHeader">
    <h2>🖼️ 분할 결과</h2>
    <span id="saveCount"></span>
  </div>
  <div id="galleryScroll">
    <div id="galleryGrid"></div>
  </div>
  <div id="galleryBottom">
    <button class="btn btn-blue" onclick="showCanvas()">← 편집</button>
    <button class="btn btn-green" onclick="downloadAll()">⬇️ 전체 저장</button>
  </div>
</div>

<script>
const canvas=document.getElementById('mainCanvas');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvasWrap');
const statusEl=document.getElementById('statusBar');
const overlay=document.getElementById('overlay');

let origImg=null,scale=1,offsetX=0,offsetY=0,dispW=0,dispH=0;
let hLines=[],vLines=[],dragging=null;
const SNAP=22;
let tiles=[],savedSet=new Set();
let gridCols=4,gridRows=5;

function applyPreset(btn){
  document.getElementById('cols').value=btn.dataset.cols;
  document.getElementById('rows').value=btn.dataset.rows;
  document.querySelectorAll('.btn-preset').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  resetLines();
}
function adjustVal(id,delta){
  const inp=document.getElementById(id);
  inp.value=Math.max(1,Math.min(20,(parseInt(inp.value)||1)+delta));
  syncPreset();resetLines();
}
function syncPreset(){
  const c=parseInt(document.getElementById('cols').value)||0;
  const r=parseInt(document.getElementById('rows').value)||0;
  document.querySelectorAll('.btn-preset').forEach(btn=>{
    btn.classList.toggle('active',
      parseInt(btn.dataset.cols)===c&&parseInt(btn.dataset.rows)===r);
  });
}

function openImage(){document.getElementById('fileInput').click()}
function loadImage(e){readFile(e.target.files[0]);e.target.value=''}
function readFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      origImg=img;overlay.style.display='none';
      fitCanvas();resetLines();
      setStatus(`${img.width}×${img.height}px — 선을 드래그해서 조정!`);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
wrap.addEventListener('dragover',e=>e.preventDefault());
wrap.addEventListener('drop',e=>{e.preventDefault();readFile(e.dataTransfer.files[0])});

function fitCanvas(){
  const pad=8;
  const maxW=wrap.clientWidth-pad*2,maxH=wrap.clientHeight-pad*2;
  scale=Math.min(maxW/origImg.width,maxH/origImg.height,1);
  dispW=Math.floor(origImg.width*scale);
  dispH=Math.floor(origImg.height*scale);
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
  offsetX=Math.floor((canvas.width-dispW)/2);
  offsetY=Math.floor((canvas.height-dispH)/2);
}
function resetLines(){
  if(!origImg)return;
  const cols=parseInt(document.getElementById('cols').value)||4;
  const rows=parseInt(document.getElementById('rows').value)||5;
  vLines=Array.from({length:cols-1},(_,i)=>offsetX+Math.floor(dispW*(i+1)/cols));
  hLines=Array.from({length:rows-1},(_,i)=>offsetY+Math.floor(dispH*(i+1)/rows));
  redraw();
}
function redraw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!origImg)return;
  ctx.drawImage(origImg,offsetX,offsetY,dispW,dispH);
  ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=1;
  ctx.strokeRect(offsetX,offsetY,dispW,dispH);
  ctx.lineWidth=2;ctx.setLineDash([8,4]);
  ctx.strokeStyle='#38bdf8';
  hLines.forEach(y=>{ctx.beginPath();ctx.moveTo(offsetX,y);ctx.lineTo(offsetX+dispW,y);ctx.stroke()});
  ctx.strokeStyle='#fbbf24';
  vLines.forEach(x=>{ctx.beginPath();ctx.moveTo(x,offsetY);ctx.lineTo(x,offsetY+dispH);ctx.stroke()});
  ctx.setLineDash([]);
  const aY=[offsetY,...hLines.slice().sort((a,b)=>a-b),offsetY+dispH];
  const aX=[offsetX,...vLines.slice().sort((a,b)=>a-b),offsetX+dispW];
  const fs=Math.max(9,Math.min(13,Math.min(dispW/aX.length/3,dispH/aY.length/3)));
  ctx.font=`bold ${fs}px sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  let n=1;
  for(let r=0;r<aY.length-1;r++)
    for(let c=0;c<aX.length-1;c++){
      const mx=(aX[c]+aX[c+1])/2,my=(aY[r]+aY[r+1])/2;
      ctx.fillStyle='rgba(124,58,237,.7)';
      ctx.beginPath();ctx.arc(mx,my,fs*1.15,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.fillText(n++,mx,my);
    }
}

function findLine(x,y){
  for(let i=0;i<hLines.length;i++) if(Math.abs(y-hLines[i])<SNAP) return{type:'h',index:i};
  for(let i=0;i<vLines.length;i++) if(Math.abs(x-vLines[i])<SNAP) return{type:'v',index:i};
  return null;
}
function moveLine(x,y){
  if(!dragging)return;
  if(dragging.type==='h') hLines[dragging.index]=Math.max(offsetY+4,Math.min(y,offsetY+dispH-4));
  else vLines[dragging.index]=Math.max(offsetX+4,Math.min(x,offsetX+dispW-4));
  redraw();
}
function getXY(e){const r=canvas.getBoundingClientRect();return[e.clientX-r.left,e.clientY-r.top]}

canvas.addEventListener('mousedown',e=>{dragging=findLine(...getXY(e))});
canvas.addEventListener('mousemove',e=>{
  const[x,y]=getXY(e);
  if(dragging){moveLine(x,y);return}
  const f=findLine(x,y);
  canvas.style.cursor=f?(f.type==='h'?'ns-resize':'ew-resize'):'crosshair';
});
canvas.addEventListener('mouseup',()=>dragging=null);
canvas.addEventListener('mouseleave',()=>dragging=null);
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0],r=canvas.getBoundingClientRect();
  dragging=findLine(t.clientX-r.left,t.clientY-r.top);
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0],r=canvas.getBoundingClientRect();
  moveLine(t.clientX-r.left,t.clientY-r.top);
},{passive:false});
canvas.addEventListener('touchend',()=>dragging=null);

function splitImage(){
  if(!origImg){alert('이미지를 먼저 열어주세요!');return}
  gridCols=parseInt(document.getElementById('cols').value)||4;
  gridRows=parseInt(document.getElementById('rows').value)||5;
  const aYc=[offsetY,...hLines.slice().sort((a,b)=>a-b),offsetY+dispH];
  const aXc=[offsetX,...vLines.slice().sort((a,b)=>a-b),offsetX+dispW];
  const toX=cx=>Math.round((cx-offsetX)/scale);
  const toY=cy=>Math.round((cy-offsetY)/scale);
  const aY=aYc.map(toY),aX=aXc.map(toX);
  const tmp=document.createElement('canvas');
  const tc=tmp.getContext('2d');
  tiles=[];
  for(let r=0;r<aY.length-1;r++)
    for(let c=0;c<aX.length-1;c++){
      const x=Math.max(0,aX[c]),y=Math.max(0,aY[r]);
      const w=Math.min(origImg.width,aX[c+1])-x;
      const h=Math.min(origImg.height,aY[r+1])-y;
      if(w<=0||h<=0)continue;
      tmp.width=w;tmp.height=h;
      tc.clearRect(0,0,w,h);
      tc.drawImage(origImg,x,y,w,h,0,0,w,h);
      tiles.push({url:tmp.toDataURL('image/png'),w,h});
    }
  savedSet=new Set();
  showGallery();
}

function showCanvas(){
  document.getElementById('screen-canvas').style.display='flex';
  document.getElementById('screen-gallery').style.display='none';
  document.getElementById('topBar').style.display='flex';
}
function showGallery(){
  document.getElementById('screen-canvas').style.display='none';
  document.getElementById('screen-gallery').style.display='flex';
  document.getElementById('topBar').style.display='none';
  buildGallery();
}

function buildGallery(){
  const grid=document.getElementById('galleryGrid');
  grid.innerHTML='';
  grid.style.gridTemplateColumns=`repeat(${gridCols},1fr)`;
  tiles.forEach((tile,i)=>{
    const item=document.createElement('div');
    item.className='img-item';item.id=`img-${i}`;
    item.innerHTML=`
      <img src="${tile.url}" loading="lazy" alt="${i+1}">
      <div class="img-num">${i+1}</div>
      <div class="img-hint">탭→저장</div>
      <div class="img-saved"><span>✅</span></div>`;
    item.addEventListener('click',()=>downloadOne(i));
    grid.appendChild(item);
  });
  updateSaveCount();
  document.getElementById('galleryScroll').scrollTop=0;
}

function downloadOne(i){
  const a=document.createElement('a');
  a.href=tiles[i].url;a.download=`${i+1}.png`;a.click();
  savedSet.add(i);
  document.getElementById(`img-${i}`).classList.add('saved');
  updateSaveCount();
}
async function downloadAll(){
  for(let i=0;i<tiles.length;i++){
    downloadOne(i);await new Promise(r=>setTimeout(r,300));
  }
}
function updateSaveCount(){
  const total=tiles.length,saved=savedSet.size;
  document.getElementById('saveCount').textContent=
    saved===0?`${total}장 — 탭하면 저장!`:
    saved===total?'🎉 전체 저장 완료!':`${saved}/${total} 저장됨`;
}
function setStatus(msg){statusEl.textContent=msg}

let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{if(!origImg)return;fitCanvas();resetLines()},150);
});
document.getElementById('cols').addEventListener('input',()=>{syncPreset();resetLines()});
document.getElementById('rows').addEventListener('input',()=>{syncPreset();resetLines()});
</script>
</body>
</html>
